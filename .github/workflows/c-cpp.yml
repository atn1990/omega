name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [gcc, clang]
        exclude:
          # Homebrew's boost is built against Apple Clang's libc++, while GNU GCC
          # uses libstdc++; their std::__cxx11 string ABIs differ, so linking the
          # compiled boost libs (program_options, stacktrace) with GCC fails with
          # undefined symbols
          # No libstdc++-built boost ships on the runner, so a real GNU GCC build
          # can't link here so skip this cell
          - os: macos-latest
            compiler: gcc

    steps:
      - uses: actions/checkout@v5
      - name: install-boost-linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-all-dev g++-14 gcc-14
      - name: install-boost-macos
        if: runner.os == 'macOS'
        run: |
          # Remove pre-installed third-party taps on the GitHub runner that trigger
          # Homebrew's untrusted-tap warning; not needed since boost is a core formula
          brew untap --force aws/tap azure/bicep || true
          brew install boost
      - name: set-compiler
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            # Only Linux reaches here (macOS + gcc is excluded above)
            # ubuntu-latest defaults to GCC 13, whose libstdc++ lacks <print>;
            # GCC 14 provides the C++23 header
            echo "CC=gcc-14" >> "$GITHUB_ENV"
            echo "CXX=g++-14" >> "$GITHUB_ENV"
          else
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
          fi
      - name: make
        run: make CC="$CC" CXX="$CXX"
      - name: driver
        run: ./driver examples/buechi01.aut --verbose=2
      - name: test
        run: VERBOSE=2 ./test
