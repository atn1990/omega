name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [gcc, clang]

    steps:
    - uses: actions/checkout@v5
    - name: install-boost-linux
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libboost-all-dev g++-14
    - name: install-boost-macos
      if: runner.os == 'macOS'
      run: brew install boost
    - name: set-compiler
      run: |
        if [ "${{ matrix.compiler }}" = "gcc" ]; then
          if [ "${{ runner.os }}" = "Linux" ]; then
            # ubuntu-latest defaults to GCC 13, whose libstdc++ lacks <print>;
            # GCC 14 provides the C++23 header.
            echo "CC=gcc-14" >> "$GITHUB_ENV"
            echo "CXX=g++-14" >> "$GITHUB_ENV"
          else
            echo "CC=gcc" >> "$GITHUB_ENV"
            echo "CXX=g++" >> "$GITHUB_ENV"
          fi
        else
          echo "CC=clang" >> "$GITHUB_ENV"
          echo "CXX=clang++" >> "$GITHUB_ENV"
        fi
    - name: make
      run: make CC="$CC" CXX="$CXX"
    - name: driver
      run: ./driver examples/buechi01.aut --verbose=2
    - name: test
      run: VERBOSE=2 ./test
